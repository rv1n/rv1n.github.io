<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<title>Sasoid</title>
	<link rel="stylesheet" href="style.css">

	<script type="text/javascript">



		var score = 0;
	
		function checkAnswer(inputId, answers){
			var userAnswer = document.getElementById(inputId).value;
			userAnswer = userAnswer.toLowerCase();
			for(var i = 0; i < answers.length; i++){
				if(userAnswer == answers[i]){
					score++;
					break;
				}
			}
		}
		
		function checkAnswers() {

			checkAnswer("userAnswer1", ["rv1n", "w083by"]);
			checkAnswer("userAnswer2", ["987122", "qwerty228"]);

			if( score == 2 ){
				document.location.href = "main.html";		
			} else{
				alert("Неверный логин или пароль");
				document.location.href = "index.html";
			}
		}




	</script>
</head>
<body>

<div class="header">
	<h1>Sasoid</h1>
</div>
<div class="content">

	<div class="center">
	<h1>Sign in</h1>

				<center>
				<div class="box">

				<p>Login</p>
				<input type="text" id="userAnswer1">

				<p>Password</p>
				<input type="text" id="userAnswer2">

				</center>
				<br><br>
				<a href="#" class="buttons" onClick = "checkAnswers();">Sign in</a>
			</div>
	</div>
</div>
<div class="footer">
	<p>Copyright &copy;Sasoid</p>
</div>

</body>
</html>
